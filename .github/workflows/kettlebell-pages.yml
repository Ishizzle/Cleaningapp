name: Deploy Kettlebell App

on:
  push:
    branches: ["main"]
    paths:
      - "kettlebell/**"
      - "kettlebell-v2/**"
      - ".github/workflows/kettlebell-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kettlebell-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Prepare site
        run: |
          mkdir -p _site/kettlebell _site/kettlebell-v2
          cp -R kettlebell/. _site/kettlebell/
          cp -R kettlebell-v2/. _site/kettlebell-v2/
          cp kettlebell/index.html _site/index.html
      - name: Upload app
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
