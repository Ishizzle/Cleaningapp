<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KB Workout">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Kettlebell Workout</title>
<style>
:root{--bg:#0b1118;--panel:#131d28;--panel2:#1a2735;--line:#2a3a4c;--text:#f5f7fa;--muted:#9fb0c3;--accent:#b8f34d;--blue:#68c8ff;--danger:#ff7a7a}
*{box-sizing:border-box}html{color-scheme:dark}body{margin:0;background:linear-gradient(180deg,#0b1118,#0e1620);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
button,input,select,textarea{font:inherit}.app{max-width:980px;margin:auto;padding:16px 16px 110px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;padding:10px 0 14px;background:rgba(11,17,24,.88);backdrop-filter:blur(16px);z-index:20}.brand{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:14px;background:var(--accent);color:#101700;display:grid;place-items:center;font-weight:900;font-size:22px}.brand h1{margin:0;font-size:19px}.brand small{color:var(--muted)}.week{padding:9px 12px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-weight:800}
.hero{padding:24px;border:1px solid var(--line);border-radius:24px;background:radial-gradient(circle at 85% 20%,rgba(184,243,77,.18),transparent 32%),linear-gradient(180deg,#141f2b,#111923);box-shadow:0 20px 50px rgba(0,0,0,.24)}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.12em}.hero h2{font-size:clamp(34px,7vw,60px);line-height:.95;margin:12px 0}.hero p{color:var(--muted);line-height:1.55;max-width:700px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.stat{background:rgba(20,31,43,.85);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}.stat b{display:block;font-size:23px}.stat span{color:var(--muted);font-size:13px}
.section{margin-top:24px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:10px;margin-bottom:10px}.section-head h3{margin:0;font-size:22px}.section-head small{color:var(--muted)}.days{display:flex;gap:9px;overflow:auto;padding-bottom:4px}.day{min-width:112px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:13px;border-radius:15px;text-align:left;cursor:pointer}.day.active{background:var(--accent);color:#101700;border-color:var(--accent)}.day b{display:block}.day small{opacity:.72}
.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.18)}.workout{padding:18px}.workout-head{display:flex;justify-content:space-between;align-items:center;gap:12px}.workout-head h3{margin:4px 0}.meta{color:var(--muted);font-size:14px}.primary,.secondary{border:0;border-radius:13px;padding:12px 15px;font-weight:900;cursor:pointer}.primary{background:var(--accent);color:#101700}.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.list{display:grid;gap:10px;margin-top:16px}.exercise{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:13px;border-radius:16px;background:var(--panel2);border:1px solid var(--line)}.exercise.done{opacity:.55}.num{width:48px;height:48px;border-radius:14px;background:#26351b;color:var(--accent);display:grid;place-items:center;font-weight:900}.exercise h4{margin:0 0 4px}.actions{display:flex;gap:8px;flex-wrap:wrap}.mini{border:0;border-radius:10px;padding:9px 11px;font-weight:800;cursor:pointer}.video{background:#203c4f;color:#a7e1ff;text-decoration:none}.donebtn{background:#2b391f;color:#d2f99a}.donebtn.on{background:var(--accent);color:#101700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.panel{padding:18px}.timer{font-size:56px;font-weight:900;letter-spacing:2px;margin:8px 0}.timer-buttons{display:flex;gap:8px;flex-wrap:wrap}.timer-buttons button{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:9px 11px;border-radius:11px;font-weight:800}.progressbar{height:13px;border-radius:999px;background:#263243;overflow:hidden}.fill{height:100%;width:0;background:var(--accent);transition:.2s}.field{display:flex;flex-direction:column;gap:6px;margin-top:12px}.field label{font-size:13px;color:var(--muted)}.field textarea,.field select{background:#0e1620;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:11px}.footer-nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(540px,calc(100% - 24px));display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;border-radius:20px;background:rgba(18,28,39,.95);border:1px solid var(--line);backdrop-filter:blur(16px);z-index:30}.nav{border:0;background:transparent;color:var(--muted);padding:10px 6px;border-radius:12px;font-weight:800}.nav.active{background:var(--panel2);color:var(--accent)}.view{display:none}.view.active{display:block}.history-list{display:grid;gap:10px}.history-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px;border-radius:15px;background:var(--panel2);border:1px solid var(--line)}.empty{color:var(--muted);padding:20px;text-align:center}.reset{color:#ffb0b0;border-color:#5a3036}.toast{position:fixed;right:16px;top:16px;padding:11px 14px;border-radius:12px;background:#203513;border:1px solid #466b2c;color:#e1ffbd;display:none;z-index:100}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr 1fr}.grid{grid-template-columns:1fr}.exercise{grid-template-columns:44px 1fr}.actions{grid-column:1/-1}.app{padding:12px 12px 104px}.timer{font-size:48px}}
</style>
</head>
<body>
<div class="toast" id="toast">Saved</div>
<div class="app">
<header class="top"><div class="brand"><div class="logo">K</div><div><h1>Kettlebell Workout</h1><small>Simple 5-day plan</small></div></div><div class="week" id="weekLabel">Week 1</div></header>
<section class="view active" id="homeView">
<div class="hero"><div class="eyebrow">TODAY'S WORKOUT</div><h2 id="heroTitle">Strength Day</h2><p id="heroText"></p><div class="stats"><div class="stat"><b id="sessionCount">0</b><span>sessions</span></div><div class="stat"><b id="weekPercent">0%</b><span>week complete</span></div><div class="stat"><b id="totalSets">0</b><span>sets checked</span></div></div></div>
<div class="section"><div class="section-head"><div><small>MONDAY TO FRIDAY</small><h3>Choose a day</h3></div></div><div class="days" id="days"></div></div>
<div class="section card workout"><div class="workout-head"><div><div class="eyebrow" id="dayName"></div><h3 id="workoutTitle"></h3><div class="meta" id="workoutMeta"></div></div><button class="primary" onclick="finishWorkout()">Finish workout</button></div><div class="list" id="exerciseList"></div></div>
<div class="grid"><div class="card panel"><div class="eyebrow">REST TIMER</div><div class="timer" id="timer">01:30</div><div class="timer-buttons"><button onclick="setTimer(60)">60 sec</button><button onclick="setTimer(90)">90 sec</button><button onclick="setTimer(120)">120 sec</button><button id="startTimer" onclick="toggleTimer()">Start</button><button onclick="resetTimer()">Reset</button></div></div><div class="card panel"><div class="eyebrow">DAILY PROGRESS</div><h3 id="progressText">0 of 0 complete</h3><div class="progressbar"><div class="fill" id="progressFill"></div></div><div class="field"><label>Workout notes</label><textarea id="notes" rows="5" placeholder="Weights used, energy level, soreness..."></textarea></div></div></div>
</section>
<section class="view" id="historyView"><div class="section-head"><div><small>YOUR DATA</small><h3>Workout history</h3></div><button class="secondary reset" onclick="resetData()">Reset</button></div><div class="card panel"><div class="history-list" id="historyList"></div></div></section>
<section class="view" id="settingsView"><div class="section-head"><div><small>SETTINGS</small><h3>Personalize</h3></div></div><div class="card panel"><div class="field"><label>Current week</label><select id="weekSelect"></select></div><div class="field"><label>Default swing weight</label><select id="swingWeight"><option>16 kg</option><option>20 kg</option><option selected>24 kg</option><option>28 kg</option><option>32 kg</option></select></div><div class="field"><label>Default press weight</label><select id="pressWeight"><option>8 kg</option><option>12 kg</option><option selected>16 kg</option><option>20 kg</option><option>24 kg</option></select></div><button class="primary" style="margin-top:14px" onclick="saveSettings()">Save settings</button></div></section>
</div>
<nav class="footer-nav"><button class="nav active" data-view="homeView" onclick="showView('homeView')">Workout</button><button class="nav" data-view="historyView" onclick="showView('historyView')">History</button><button class="nav" data-view="settingsView" onclick="showView('settingsView')">Settings</button></nav>
<script>
const PROGRAM={Monday:{title:'Strength',duration:50,focus:'Full-body strength',exercises:[['Goblet Squat','5 × 5','24 kg','https://www.youtube.com/results?search_query=dan+john+goblet+squat'],['Single Arm Overhead Press','5 × 5 each arm','PRESS','https://www.youtube.com/results?search_query=single+arm+kettlebell+overhead+press'],['Single Arm Row','4 × 8 each arm','20 kg','https://www.youtube.com/results?search_query=single+arm+kettlebell+row'],['Suitcase Carry','4 × 40 m each side','24 kg','https://www.youtube.com/results?search_query=suitcase+carry+kettlebell'],['Plank','3 × 45 to 60 sec','Bodyweight','https://www.youtube.com/results?search_query=proper+plank+form']]},Tuesday:{title:'Conditioning',duration:40,focus:'Endurance and work capacity',exercises:[['Kettlebell Swing','10 × 20','SWING','https://www.youtube.com/results?search_query=mark+wildman+kettlebell+swing'],['Push-up','4 × 10 to 15','Bodyweight','https://www.youtube.com/results?search_query=push+up+proper+form'],['Goblet Squat','3 × 15','20 kg','https://www.youtube.com/results?search_query=dan+john+goblet+squat'],['Mountain Climber','3 × 30 sec','Bodyweight','https://www.youtube.com/results?search_query=mountain+climber+exercise'],['Dead Bug','3 × 12 each side','Bodyweight','https://www.youtube.com/results?search_query=dead+bug+exercise']]},Wednesday:{title:'Upper Body',duration:50,focus:'Pressing and pulling strength',exercises:[['Single Arm Floor Press','4 × 8 each arm','PRESS','https://www.youtube.com/results?search_query=kettlebell+floor+press'],['Single Arm Row','4 × 10 each arm','20 kg','https://www.youtube.com/results?search_query=single+arm+kettlebell+row'],['Half Kneeling Press','3 × 10 each arm','PRESS','https://www.youtube.com/results?search_query=half+kneeling+kettlebell+press'],['Hammer Curl','3 × 12 each arm','12 kg','https://www.youtube.com/results?search_query=kettlebell+hammer+curl'],['Turkish Get-up','3 × 1 each side','12 kg','https://www.youtube.com/results?search_query=mark+wildman+turkish+get+up']]},Thursday:{title:'Lower Body',duration:50,focus:'Leg strength and posterior chain',exercises:[['Goblet Squat','5 × 8','24 kg','https://www.youtube.com/results?search_query=dan+john+goblet+squat'],['Bulgarian Split Squat','3 × 10 each leg','16 kg','https://www.youtube.com/results?search_query=bulgarian+split+squat+kettlebell'],['Single Leg Romanian Deadlift','3 × 10 each leg','16 kg','https://www.youtube.com/results?search_query=single+leg+romanian+deadlift+kettlebell'],['Kettlebell Swing','5 × 20','SWING','https://www.youtube.com/results?search_query=mark+wildman+kettlebell+swing'],['Side Plank','3 × 30 sec each side','Bodyweight','https://www.youtube.com/results?search_query=side+plank+exercise']]},Friday:{title:'Full Body',duration:45,focus:'Power and conditioning',exercises:[['Single Arm Clean','5 × 5 each arm','20 kg','https://www.youtube.com/results?search_query=single+arm+kettlebell+clean'],['Push Press','5 × 5 each arm','PRESS','https://www.youtube.com/results?search_query=single+arm+kettlebell+push+press'],['Goblet Squat','5 × 10','24 kg','https://www.youtube.com/results?search_query=dan+john+goblet+squat'],['Kettlebell Swing','5 × 15','SWING','https://www.youtube.com/results?search_query=mark+wildman+kettlebell+swing'],['Reverse Lunge','5 × 5 each leg','16 kg','https://www.youtube.com/results?search_query=reverse+lunge+kettlebell']]}};
const DEFAULT={week:1,currentDay:'Monday',sessions:0,totalSets:0,done:{},completed:{},history:[],notes:{},settings:{swingWeight:'24 kg',pressWeight:'16 kg'}};
let state=load();let seconds=90,timerHandle=null,running=false;
function load(){try{return Object.assign({},DEFAULT,JSON.parse(localStorage.getItem('kb-simple')||'{}'))}catch{return JSON.parse(JSON.stringify(DEFAULT))}}
function save(){localStorage.setItem('kb-simple',JSON.stringify(state));render();toast('Saved')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1100)}
function key(day,index){return 'w'+state.week+'-'+day+'-'+index}function dayKey(day){return 'w'+state.week+'-'+day}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.view===id));if(id==='historyView')renderHistory()}
function selectDay(day){state.currentDay=day;save()}function actualWeight(value){if(value==='SWING')return state.settings.swingWeight;if(value==='PRESS')return state.settings.pressWeight;return value}
function toggleExercise(index){const k=key(state.currentDay,index);const was=!!state.done[k];state.done[k]=!was;if(!was)state.totalSets++;else state.totalSets=Math.max(0,state.totalSets-1);save()}
function finishWorkout(){const dk=dayKey(state.currentDay);if(!state.completed[dk]){state.completed[dk]=true;state.sessions++;state.history.unshift({date:new Date().toISOString(),day:state.currentDay,title:PROGRAM[state.currentDay].title,week:state.week,duration:PROGRAM[state.currentDay].duration})}save();toast('Workout completed')}
function updateNotes(){state.notes[dayKey(state.currentDay)]=document.getElementById('notes').value;localStorage.setItem('kb-simple',JSON.stringify(state))}
function render(){const day=PROGRAM[state.currentDay];document.getElementById('weekLabel').textContent='Week '+state.week;document.getElementById('heroTitle').textContent=day.title+' Day';document.getElementById('heroText').textContent=day.focus+'. '+day.exercises.length+' exercises planned for about '+day.duration+' minutes.';document.getElementById('sessionCount').textContent=state.sessions;document.getElementById('totalSets').textContent=state.totalSets;const doneDays=Object.keys(PROGRAM).filter(d=>state.completed[dayKey(d)]).length;document.getElementById('weekPercent').textContent=Math.round(doneDays/5*100)+'%';document.getElementById('dayName').textContent=state.currentDay.toUpperCase();document.getElementById('workoutTitle').textContent=day.title;document.getElementById('workoutMeta').textContent=day.focus+' · '+day.duration+' min';const days=document.getElementById('days');days.innerHTML='';Object.keys(PROGRAM).forEach(d=>{const b=document.createElement('button');b.className='day'+(d===state.currentDay?' active':'');b.innerHTML='<b>'+d.slice(0,3)+'</b><small>'+(state.completed[dayKey(d)]?'Completed':PROGRAM[d].title)+'</small>';b.onclick=()=>selectDay(d);days.appendChild(b)});const list=document.getElementById('exerciseList');list.innerHTML='';day.exercises.forEach((x,i)=>{const done=!!state.done[key(state.currentDay,i)];const row=document.createElement('div');row.className='exercise'+(done?' done':'');row.innerHTML='<div class="num">'+(i+1)+'</div><div><h4>'+x[0]+'</h4><div class="meta">'+x[1]+' · '+actualWeight(x[2])+'</div></div><div class="actions"><a class="mini video" target="_blank" rel="noopener" href="'+x[3]+'">Video</a><button class="mini donebtn '+(done?'on':'')+'" onclick="toggleExercise('+i+')">'+(done?'Done':'Complete')+'</button></div>';list.appendChild(row)});const doneCount=day.exercises.filter((_,i)=>state.done[key(state.currentDay,i)]).length;document.getElementById('progressText').textContent=doneCount+' of '+day.exercises.length+' complete';document.getElementById('progressFill').style.width=(doneCount/day.exercises.length*100)+'%';const notes=document.getElementById('notes');notes.value=state.notes[dayKey(state.currentDay)]||'';notes.oninput=updateNotes;renderSettings();renderHistory()}
function renderHistory(){const el=document.getElementById('historyList');el.innerHTML='';if(!state.history.length){el.innerHTML='<div class="empty">No completed workouts yet.</div>';return}state.history.forEach(h=>{const row=document.createElement('div');row.className='history-item';row.innerHTML='<div><b>'+h.day+' · '+h.title+'</b><div class="meta">Week '+h.week+' · '+new Date(h.date).toLocaleDateString()+'</div></div><span>'+h.duration+' min</span>';el.appendChild(row)})}
function renderSettings(){const week=document.getElementById('weekSelect');if(!week.options.length){for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent='Week '+i;week.appendChild(o)}}week.value=state.week;document.getElementById('swingWeight').value=state.settings.swingWeight;document.getElementById('pressWeight').value=state.settings.pressWeight}
function saveSettings(){state.week=Number(document.getElementById('weekSelect').value);state.settings.swingWeight=document.getElementById('swingWeight').value;state.settings.pressWeight=document.getElementById('pressWeight').value;save()}
function resetData(){if(confirm('Reset all workout history and settings?')){state=JSON.parse(JSON.stringify(DEFAULT));save()}}
function setTimer(s){seconds=s;paintTimer()}function paintTimer(){document.getElementById('timer').textContent=String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0')}function toggleTimer(){if(running){clearInterval(timerHandle);running=false;document.getElementById('startTimer').textContent='Start';return}running=true;document.getElementById('startTimer').textContent='Pause';timerHandle=setInterval(()=>{seconds--;paintTimer();if(seconds<=0){clearInterval(timerHandle);running=false;document.getElementById('startTimer').textContent='Start';if(navigator.vibrate)navigator.vibrate([150,80,150]);toast('Rest complete')}},1000)}function resetTimer(){clearInterval(timerHandle);running=false;seconds=90;document.getElementById('startTimer').textContent='Start';paintTimer()}
render();paintTimer();
</script>
</body>
</html>
